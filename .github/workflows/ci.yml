name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Repository hygiene check
        run: npm run clean:repo:check

      - name: Security audit (CI policy)
        run: npm run audit:ci

      - name: Lockfile floor guard
        run: npm run test -- test/lockfile-version-floor.test.ts

      - name: Security audit (full dependency tree, non-blocking)
        continue-on-error: true
        run: npm run audit:all

      - name: Run type check
        run: npm run typecheck

      - name: Generate and verify SBOM
        run: |
          npm run sbom:generate
          npm run sbom:verify

      - name: Run tests with coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Assert keychain mode storage contract
        run: npm run ops:keychain-assert

      - name: Seed enterprise health fixture
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const root=path.join(process.env.GITHUB_WORKSPACE,'.tmp','health-fixture'); const logs=path.join(root,'logs'); fs.mkdirSync(logs,{recursive:true}); fs.writeFileSync(path.join(root,'openai-codex-accounts.json'), JSON.stringify({version:4,accounts:[{refreshTokenRef:'fixture-account:refresh',accessTokenRef:'fixture-account:access',addedAt:1,lastUsed:1}],activeIndex:0,activeIndexByFamily:{codex:0,legacy:0,gpt5:0,o3:0,o4mini:0,oss:0},}, null, 2)+'\\n'); fs.writeFileSync(path.join(root,'settings.json'), JSON.stringify({version:1,pluginConfig:{},dashboardDisplaySettings:{}}, null, 2)+'\\n'); fs.writeFileSync(path.join(logs,'audit.log'), JSON.stringify({timestamp:new Date().toISOString(),action:'request.start',outcome:'success'})+'\\n');"

      - name: Enterprise health check
        env:
          CODEX_MULTI_AUTH_DIR: ${{ github.workspace }}/.tmp/health-fixture
        run: npm run ops:health-check -- --require-files

      - name: Performance budget check
        run: npm run perf:budget-check

  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  codex-compat:
    name: Codex Compatibility Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Codex compatibility tests
        run: npm run test -- test/codex.test.ts test/host-codex-prompt.test.ts test/request-transformer.test.ts test/fetch-helpers.test.ts
